<title>我在虫族做虫母</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#120E1C;--bg-panel:rgba(18,14,28,0.95);--bg-card:rgba(201,64,112,0.06);
  --rose:#C94070;--rose-dim:rgba(201,64,112,0.4);--rose-glow:rgba(201,64,112,0.2);
  --amber:#D4924A;--amber-dim:rgba(212,146,74,0.4);
  --ivory:#F2EDE4;--ivory-dim:rgba(242,237,228,0.6);
  --purple:#9B6FD4;--purple-dim:rgba(155,111,212,0.3);
  --orange:#E85D2F;--grey:#9A96A8;
  --border:rgba(122, 107, 112, 0.18);--border2:rgba(242,237,228,0.08);
  --font:'Noto Serif SC',Georgia,serif;
}
html,body{width:100%;height:100%;background:var(--bg);color:var(--ivory);font-family:var(--font);overflow:hidden;font-size:13px;-webkit-font-smoothing:antialiased;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 25% 15%,rgba(201,64,112,0.05) 0%,transparent 55%),radial-gradient(ellipse at 75% 85%,rgba(155,111,212,0.04) 0%,transparent 50%);pointer-events:none;z-index:0;}
#gc{position:relative;z-index:1;width:100%;height:100%;display:flex;flex-direction:column;}
#header{flex-shrink:0;background:rgba(18,14,28,0.97);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;}
#header h1{font-size:18px;color:var(--rose);letter-spacing:4px;font-weight:700;}
#header-right{display:flex;gap:8px;}
#header-right button{background:none;border:1px solid var(--border);color:var(--grey);font-family:var(--font);font-size:10px;padding:4px 12px;border-radius:20px;cursor:pointer;transition:all 0.2s;}
#header-right button:hover{color:var(--rose);border-color:var(--rose-dim);}
#stats-bar{flex-shrink:0;display:flex;background:rgba(18,14,28,0.9);border-bottom:1px solid var(--border);}
.si{flex:1;padding:8px 12px;text-align:center;border-right:1px solid var(--border2);}
.si:last-child{border-right:none;}
.sl{font-size:10px;color:var(--grey);margin-bottom:2px;letter-spacing:1px;}
.sv{font-size:17px;font-weight:700;color:var(--ivory);}
.sr{font-size:10px;color:var(--amber);margin-top:2px;font-weight:600;letter-spacing:1px;}
#main-area{flex:1;display:flex;overflow:hidden;min-height:0;}
#log-panel{flex:1;display:flex;flex-direction:column;min-width:0;border-right:1px solid var(--border);}
#log-title-bar{flex-shrink:0;padding:7px 14px;background:rgba(201,64,112,0.06);border-bottom:1px solid var(--border);font-size:11px;color:var(--rose);font-weight:600;letter-spacing:3px;}
#log-scroll{flex:1;overflow-y:auto;padding:6px 14px;scroll-behavior:smooth;}
#log-scroll::-webkit-scrollbar{width:0;display:none;}
.le{padding:4px 0;font-size:12.5px;line-height:1.65;color:var(--ivory-dim);animation:li .4s ease;border-bottom:1px solid rgba(242,237,228,0.03);}
.le.es{color:var(--amber);padding-left:8px;border-left:2px solid var(--amber-dim);}
.le.ed{color:var(--orange);padding-left:8px;border-left:2px solid rgba(232,93,47,0.4);}
.le.er{color:var(--purple);padding-left:8px;border-left:2px solid var(--purple-dim);}
@keyframes li{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
#side-panel{width:280px;flex-shrink:0;display:flex;flex-direction:column;overflow-y:auto;background:var(--bg-panel);}
#side-panel::-webkit-scrollbar{width:0;display:none;}
#nest-click-area{padding:14px 16px;border-bottom:1px solid var(--border);text-align:center;}
#nest-level-name{font-size:14px;color:var(--rose);font-weight:700;margin-bottom:2px;}
#nest-level-sub{font-size:10px;color:var(--grey);margin-bottom:12px;line-height:1.5;}
#click-btn{
  display:inline-block;padding:0;height:36px;position:relative;
  background:none;border:none;cursor:pointer;overflow:visible;border-radius:18px;
}
#click-btn-inner{
  padding:0 24px;height:36px;
  background:rgba(201,64,112,0.1);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border:1px solid rgba(201,64,112,0.28);border-radius:18px;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font);font-size:12px;font-weight:600;color:var(--rose);
  letter-spacing:2px;transition:all .2s;
}
#click-btn:hover #click-btn-inner{background:rgba(201,64,112,0.2);border-color:rgba(201,64,112,0.45);color:var(--ivory);box-shadow:0 0 16px rgba(201,64,112,0.12);}
#click-btn:active #click-btn-inner{transform:scale(0.95);background:rgba(201,64,112,0.28);}
.cf{position:absolute;pointer-events:none;font-size:13px;font-weight:700;color:var(--amber);animation:fu .7s ease-out forwards;text-shadow:0 0 6px rgba(212,146,74,0.4);}
@keyframes fu{from{opacity:1;transform:translateY(0);}to{opacity:0;transform:translateY(-35px);}}
#tags-area{margin-top:10px;display:flex;flex-wrap:wrap;gap:5px;justify-content:center;min-height:0;}
.tag{font-size:9px;padding:3px 8px;border-radius:10px;letter-spacing:1px;font-weight:600;}
.tag-rose{background:rgba(201,64,112,0.15);color:var(--rose);border:1px solid rgba(201,64,112,0.25);}
.tag-amber{background:rgba(212,146,74,0.12);color:var(--amber);border:1px solid rgba(212,146,74,0.25);}
.tag-purple{background:rgba(155,111,212,0.12);color:var(--purple);border:1px solid rgba(155,111,212,0.25);}
.tag-orange{background:rgba(232,93,47,0.12);color:var(--orange);border:1px solid rgba(232,93,47,0.25);}
#upgrade-area{padding:10px 16px;border-bottom:1px solid var(--border);}
#upgrade-btn{width:100%;padding:9px;background:rgba(201,64,112,0.06);border:1px solid var(--border);border-radius:8px;color:var(--grey);font-family:var(--font);font-size:11px;cursor:pointer;transition:all .2s;}
#upgrade-btn.ca{color:var(--rose);border-color:var(--rose-dim);background:rgba(201,64,112,0.12);}
#upgrade-btn.ca:hover{background:rgba(201,64,112,0.22);box-shadow:0 0 15px var(--rose-glow);}
#upgrade-btn.mx{color:var(--amber);border-color:var(--amber-dim);cursor:default;}
#drone-section{padding:10px 16px;flex:1;}
#drone-section h3{font-size:11px;color:var(--rose);margin-bottom:8px;letter-spacing:2px;font-weight:600;}
.dc{background:var(--bg-card);border:1px solid var(--border2);border-radius:8px;padding:8px 10px;margin-bottom:6px;cursor:pointer;transition:all .2s;}
.dc:hover{border-color:var(--rose-dim);background:rgba(201,64,112,0.1);}
.dc.lk{opacity:0.35;cursor:default;}.dc.lk:hover{border-color:var(--border2);background:var(--bg-card);}
.dn{font-size:13px;font-weight:600;color:var(--ivory);margin-bottom:1px;}
.dr{font-size:10px;color:var(--grey);}
.ds{display:flex;gap:3px;margin-top:5px;}
.sd{width:7px;height:7px;border-radius:50%;border:1px solid var(--rose-dim);background:transparent;transition:all .3s;}
.sd.fl{background:var(--rose);border-color:var(--rose);box-shadow:0 0 4px var(--rose-glow);}
.dpb{width:100%;height:2px;background:rgba(201,64,112,0.1);border-radius:1px;margin-top:4px;overflow:hidden;}
.dpf{height:100%;background:var(--rose);border-radius:1px;transition:width .3s;}
#bottom-bar{flex-shrink:0;padding:5px 14px;background:rgba(10,7,16,0.95);border-top:1px solid var(--border);font-size:9px;color:rgba(154,150,168,0.4);text-align:center;letter-spacing:1px;}

/* MODALS */
.mo{display:none;position:fixed;inset:0;background:rgba(10,7,16,0.9);z-index:100;justify-content:center;align-items:center;padding:20px;}
.mo.active{display:flex;}
.mb{background:radial-gradient(ellipse at 50% 20%,rgba(30,22,42,0.98),rgba(14,10,22,0.99));border:1px solid var(--rose-dim);border-radius:14px;padding:24px 22px;max-width:420px;width:100%;animation:mi .3s ease;box-shadow:0 0 50px rgba(201,64,112,0.1);}
@keyframes mi{from{opacity:0;transform:scale(0.93) translateY(16px);}to{opacity:1;transform:scale(1) translateY(0);}}
.mt{font-size:18px;color:var(--rose);margin-bottom:12px;text-align:center;font-weight:700;letter-spacing:2px;}
.md{font-size:12.5px;line-height:1.8;color:var(--ivory-dim);margin-bottom:18px;}
.mc{display:block;width:100%;padding:12px 14px;margin-bottom:8px;background:rgba(201,64,112,0.06);border:1px solid var(--border);border-radius:10px;color:var(--ivory-dim);font-family:var(--font);font-size:12px;text-align:left;cursor:pointer;transition:all .2s;line-height:1.6;}
.mc:hover{background:rgba(201,64,112,0.15);border-color:var(--rose);color:var(--ivory);}
.mc .cl{font-weight:700;color:var(--rose);display:block;margin-bottom:3px;font-size:13px;}

/* DRONE DETAIL */
#dm .mb{max-width:380px;}
.ddn{font-size:20px;color:var(--rose);font-weight:700;margin-bottom:3px;}
.ddr{font-size:11px;color:var(--grey);margin-bottom:4px;}
.ddt{font-size:10px;color:var(--amber);margin-bottom:12px;font-weight:600;letter-spacing:1px;background:rgba(212,146,74,0.1);display:inline-block;padding:2px 8px;border-radius:4px;border:1px solid rgba(212,146,74,0.3);}
.ddd{font-size:12px;line-height:1.7;color:var(--ivory-dim);margin-bottom:14px;padding:10px;background:rgba(201,64,112,0.04);border-radius:8px;border:1px solid var(--border2);}
.dsr{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:11px;}
.dsn{color:var(--grey);width:42px;}.dsn.cu{color:var(--rose);font-weight:700;}
.dsb{flex:1;height:3px;background:rgba(201,64,112,0.1);border-radius:2px;overflow:hidden;}
.dsf{height:100%;background:var(--rose);border-radius:2px;}
.dsnum{font-size:9px;color:var(--grey);width:55px;text-align:right;}
.da{display:flex;gap:8px;margin-top:12px;}
.da button{flex:1;padding:9px;background:rgba(201,64,112,0.06);border:1px solid var(--border);border-radius:8px;color:var(--grey);font-family:var(--font);font-size:11px;cursor:pointer;transition:all .2s;}
.da button.pr{color:var(--rose);border-color:var(--rose-dim);}.da button.pr:hover{background:rgba(201,64,112,0.2);}
.da button:disabled{opacity:0.25;cursor:default;}
.dcl{margin-top:10px;width:100%;padding:7px;background:none;border:1px solid var(--border2);border-radius:6px;color:var(--grey);font-family:var(--font);font-size:10px;cursor:pointer;}

/* END */
#eo{display:none;position:fixed;inset:0;z-index:200;justify-content:center;align-items:center;padding:20px;}
#eo.active{display:flex;}
#ec{max-width:400px;width:100%;border-radius:14px;padding:28px 22px;text-align:center;animation:mi .5s ease;border:1px solid;max-height:85vh;overflow-y:auto;}
#ec::-webkit-scrollbar{width:0;display:none;}
#et{font-size:24px;font-weight:700;margin-bottom:6px;}
#esu{font-size:11px;margin-bottom:16px;opacity:0.6;}
#ede{font-size:12.5px;line-height:1.9;margin-bottom:18px;text-align:left;}
#est{display:flex;justify-content:center;gap:18px;margin-bottom:18px;font-size:11px;}
.esv{font-size:18px;font-weight:700;}
#er{padding:10px 30px;border-radius:8px;border:1px solid;font-family:var(--font);font-size:12px;cursor:pointer;transition:all .2s;background:rgba(255,255,255,0.06);color:var(--ivory);}
#er:hover{background:rgba(255,255,255,0.12);}
#ewm{font-size:8px;color:rgba(255,255,255,0.2);margin-top:12px;}
#eac{text-align:left;margin-bottom:18px;}
#eac:empty{display:none;}
.eac-title{font-size:10px;letter-spacing:2px;margin-bottom:8px;text-align:center;opacity:0.5;}
.eac-item{display:flex;align-items:baseline;gap:6px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.05);}
.eac-item:last-child{border-bottom:none;}
.eac-name{font-size:11px;font-weight:600;white-space:nowrap;}
.eac-desc{font-size:10px;opacity:0.5;}

/* TOAST */
#toast{display:none;position:fixed;top:50px;left:50%;transform:translateX(-50%);z-index:150;background:rgba(18,14,28,0.96);border:1px solid var(--rose);border-radius:10px;padding:10px 18px;box-shadow:0 0 25px var(--rose-glow);max-width:320px;text-align:center;}
#toast.show{display:block;animation:mi .4s ease;}
.tl{font-size:9px;color:var(--rose-dim);letter-spacing:2px;margin-bottom:3px;}
.tna{font-size:14px;color:var(--rose);font-weight:700;margin-bottom:3px;}
.tde{font-size:10px;color:var(--grey);}

/* ACH */
#am .mb{max-width:400px;max-height:75vh;overflow-y:auto;}
#am .mb::-webkit-scrollbar{width:0;display:none;}
.ai{padding:9px 10px;margin-bottom:6px;border-radius:8px;border:1px solid var(--border2);background:rgba(201,64,112,0.03);}
.ai.done{border-color:var(--rose-dim);background:rgba(201,64,112,0.08);}
.an{font-size:13px;font-weight:600;}.ad2{font-size:10px;color:var(--grey);margin-top:2px;}

/* MOBILE */
@media(max-width:700px){
  #main-area{flex-direction:column;}
  #log-panel{border-right:none;border-bottom:1px solid var(--border);flex:1 1 35%;min-height:0;}
  #side-panel{width:100%;flex:0 0 auto;max-height:65%;}
  #header h1{font-size:15px;letter-spacing:2px;}
  .sv{font-size:14px;}
  .mb{padding:18px 14px;}
}
</style>

.5},{'n':'繁育温室','d':'开始吸引蝴蝶、飞蛾类美型低阶雄虫。','cost':0xc8,'ck':0x2,'idle':1.5},{'n':'琥珀回廊','d':'中阶公虫闻讯而来，巢穴有了暖光和回廊。','cost':0x320,'ck':0x4,'idle':0x4},{'n':'鸣蝉花苑','d':'各族开始派遣优质雄虫前来朝觐。','cost':0x9c4,'ck':0x7,'idle':0x8},{'n':'月蚕锦帐','d':'你的每一次呼吸都让方圆百里的公虫颤抖。','cost':0x1f40,'ck':0xc,'idle':0x10},{'n':'蜂后王庭','d':'侍从官、传令虫、侍寝名册，一应俱全。','cost':0x61a8,'ck':0x14,'idle':0x1e},{'n':'深渊母树','d':'地下帝国成型，荷尔蒙穿透岩层传遍大陆。','cost':0x13880,'ck':0x23,'idle':0x37},{'n':'至高圣殿','d':'整个星系的虫族皆为你而生，为你而死。','cost':0x3d090,'ck':0x3c,'idle':0x64}];vmc_7d07c7['NL']=NL;globalThis['NL']=vmc_7d07c7['NL'];vmc_7d07c7['NL']=NL;globalThis['NL']=NL;delete vmc_7d07c7['_$I6Z2Aw']['NL'];const SN=['好奇','亲近','缠绵','共生'];vmc_7d07c7['SN']=SN;globalThis['SN']=vmc_7d07c7['SN'];vmc_7d07c7['SN']=SN;globalThis['SN']=SN;delete vmc_7d07c7['_$I6Z2Aw']['SN'];const DD={'sirius':{'name':'塞琉斯','race':'绢蛾族','tags':'卑微求偶\x20/\x20隐忍\x20/\x20触觉依赖','desc':'绢蛾族天生脆弱，被本能驱使着寻找母体。他是第一个爬进你巢穴的雄虫，薄如蝉翼的白翅上有残破的旧伤。不敢奢求交配权，总是用那双毛茸茸的触须小心翼翼地试探你，只求能跪在床边，贪婪地嗅闻你发带上残留的体液气味。','lv':0x1,'costs':[0x50,0xc8,0x1f4,0x4b0],'bi':0.2,'hidden':![]},'cassius':{'name':'卡修','race':'螳螂族','tags':'掠夺本能\x20/\x20暴躁\x20/\x20食欲与交配欲','desc':'螳螂族的交配往往伴随被母体啃食的死亡，但他看你的眼神里交织着极度的饥饿与狂热的欲念。那双能轻易切碎异兽的锋利刀臂，在你面前却只能死死收起锯齿。他曾抵着你的脖颈，用颤抖的沙哑声音说：“如果是被您吃掉……也是无上的奖赏。”','lv':0x3,'costs':[0x78,0x15e,0x320,0x708],'bi':0.2,'hidden':![]},'orpheus':{'name':'奥菲斯','race':'幻蝶族','tags':'极乐致幻\x20/\x20病态粘人\x20/\x20信息素成瘾','desc':'翅膀上流转着剧毒的荧光鳞粉，能轻易让猎物陷入发情的幻觉。看似像个轻浮讨喜的漂亮宠物，实则用最甜美的伪装掩饰疯狂的独占欲。他喜欢用带有致幻液体的唇擦过你的耳廓，看着你在他的信息素里软下腰肢，彻底依赖他。','lv':0x3,'costs':[0x78,0x15e,0x320,0x708],'bi':0.2,'hidden':![]},'acheron':{'name':'阿刻戎','race':'帝蝎族','tags':'绝对服从\x20/\x20禁欲系\x20/\x20致命毒刺','desc':'战力最强、最冷硬的甲壳种。他像一具没有痛觉的兵器，面对你的第一句话永远是冰冷的“请下达指令”。然而，他背后那根足以致任何高阶雄虫于死地的毒尾，却在你靠近时会难以自控地痉挛，甚至滴下透明的毒液——那是他极度隐忍的证明。','lv':0x5,'costs':[0xc8,0x1f4,0x4b0,0x9c4],'bi':0.2,'hidden':![]},'ignis':{'name':'伊格尼斯','race':'火蛾族','tags':'飞蛾扑火\x20/\x20极高温\x20/\x20短暂而疯狂','desc':'寿命极短，体温高得灼人。因为知道自己很快会死，所以对你的渴求不加任何掩饰。拥抱他就像拥抱一团随时会燃尽的火，他总是在夜里死死抱住你，在你耳边用几乎快要碎掉的声音乞求：“在死之前，求您让我留在里面……”','lv':0x6,'costs':[0xfa,0x258,0x5dc,0xbb8],'bi':0.2,'hidden':![]},'moss':{'name':'摩斯','race':'蛛族','tags':'幽闭强制\x20/\x20织网者\x20/\x20缓慢注射','desc':'隐匿在母巢最深处的阴影中。当你察觉到他时，周围已经布满了肉眼难辨的粘稠蛛丝。他最擅长伪装成温柔的倾听者，然后在你最放松的时刻，用带有轻微麻痹毒素的螯肢刺破你的皮肤，将你一点点拖入他织好的、永远无法逃脱的深渊。','lv':0x7,'costs':[0x15e,0x320,0x7d0,0xfa0],'bi':0.2,'hidden':!![]}};vmc_7d07c7['DD']=DD;globalThis['DD']=vmc_7d07c7['DD'];vmc_7d07c7['DD']=DD;globalThis['DD']=DD;delete vmc_7d07c7['_$I6Z2Aw']['DD'];const CE=[{'t':'工虫用腺体分泌的黏液为你重新涂抹了温床，这种带点腥甜的气味让你感到莫名的燥热。','h':0x5},{'t':'母巢深处的温度明显升高了。周围的肉质内壁在规律地搏动，仿佛整个巢穴都在随你的呼吸而发情。','h':0x8},{'t':'你不小心溢出了一丝高浓度的信息素。巢穴外围瞬间传来雄虫们此起彼伏的嘶鸣和甲壳相互摩擦的躁动声。','h':0xc},{'t':'门口堆放着几具新鲜的高阶异兽尸体，血液还在滴答作响。不知道是哪只公虫半夜发疯去捕猎，只为了向你展示雄性的力量。','h':0xf},{'t':'一只低阶兵虫因为离你太近，被高浓度的信息素刺激得濒临暴走。你不得不叹了口气，主动散发出安抚性的荷尔蒙来平息他的狂躁。','h':-0xf},{'t':'两只卫虫为了争夺你掉落的一根发丝打得不可开交，残肢乱飞。你微怒地释放出母体威压强行镇压了骚动，这消耗了你不少体力。','h':-0x14},{'t':'底层孵化池里的幼虫集体陷入饥饿引发的哀鸣。你划破指尖，滴落了几滴极高纯度的体液，才让它们满足地陷入沉睡。','h':-0xa},{'t':'你在睡梦中感觉到无数复眼在黑暗中注视着你。当你翻身睁眼，暗处的喘息声瞬间消失，只留下空气中浓郁的雄性气味。'},{'t':'半梦半醒间，有冰凉柔软的触须在轻抚你的小腿。那种触感带着讨好和克制的颤抖，在你彻底醒来前迅速退回了阴影里。'},{'t':'你发现平时穿的轻纱被某种丝线缝补过，丝线上残留着浓烈的、属于雄虫的特殊气味。有虫在用这种方式隐秘地标记你。'},{'t':'一只没控制住本能的卫虫在路过你门口时突然僵直，随后在巨大的发情痛苦中生生折断了自己的一根触角。'},{'t':'有只迷路的幼虫爬进来了，被工虫送走了。什么都没发生。'},{'t':'巡逻卫虫报告一切正常。你翻个身继续睡。','h':0x3},{'t':'一只不知道谁的公虫在门口放了一朵发光的花。没留名。','h':0x8},{'t':'外面传来一阵骚动，说有飞鸟路过。虚惊一场。'}];vmc_7d07c7['CE']=CE;globalThis['CE']=vmc_7d07c7['CE'];vmc_7d07c7['CE']=CE;globalThis['CE']=CE;delete vmc_7d07c7['_$I6Z2Aw']['CE'];const DE={'sirius':[{'t':'塞琉斯以为你睡着了。他跪在床边，毛茸茸的触须贪婪地扫过你换下的衣物，发出一阵压抑的急促喘息。','h':0x5,'c':'es'},{'t':'你醒来时，发现脚踝上沾着一点透明的黏液。塞琉斯躲在门外，薄翅心虚地发着抖。'},{'t':'几只强壮的兵虫在走廊撞倒了塞琉斯。你不得不用释放了一丝威压赶走兵虫，并允许他靠在你膝盖上平复恐惧。','h':-0xa,'c':'ed'},{'t':'他小心翼翼地把一点刚采集的、最纯净的蜜露喂到你唇边，手指碰到你的瞬间，整只虫像是触电般僵住了。','h':0x8,'c':'es'},{'t':'塞琉斯在你睡着以后把被子重新盖好了。轻手轻脚的，差点没注意到。'},{'t':'塞琉斯翅膀上的旧伤又裂了，他躲在角落自己处理，被你看见后慌忙把翅膀收到身后。'}],'cassius':[{'t':'卡修拖着半截巨大的异兽尸体丢在你的温床前。血液溅到了墙上，他正用一种极度饥饿的眼神死死盯着你。','h':0xf,'c':'es'},{'t':'在为你梳理长发时，卡修的刀臂没控制好力道，割断了一缕头发。他恐慌地立刻跪下，甚至想切断自己的前臂谢罪。你费了很大劲才安抚住他。','h':-0xf,'c':'ed'},{'t':'你只是随意地摸了一下卡修的后颈，他突然发出一声嘶吼，锋利的锯齿深深嵌进他自己的掌心，靠疼痛来压制强行抱住你的交配本能。'},{'t':'一只没长眼的工虫不小心碰到了你的衣角。卡修差点当场把它嚼碎，空气里弥漫着他暴躁的信息素。','h':0x5,'c':'es'},{'t':'卡修巡逻时把一只靠你房间太近的工虫吓哭了。理由是“他看你的眼神不对”。'},{'t':'卡修把别的公虫送你的花切碎了。你问为什么，他说“有毒”。'}],'orpheus':[{'t':'奥菲斯在茧室里抖落了太多荧光鳞粉。你吸入后感到一阵奇异的燥热和眩晕，他趁机用带着甜香的舌尖舔舐你的指尖。','h':-0xa,'c':'ed'},{'t':'奥菲斯在你耳边轻声哼唱幻蝶族的求偶调，致幻的音波让你有一瞬间完全失去了力气，只能软倒在他散发着异香的怀里。'},{'t':'奥菲斯强行喂给了你一口不知名的液体。很甜，喝下去后你感觉体内的母巢能量异常充盈，但他看着你的眼神越来越暗。','h':0x14,'c':'es'},{'t':'你发现其他几只靠近过你的公虫都出现了轻微的神经中毒症状。奥菲斯无辜地眨了眨眼，表示自己什么都没做。','h':-0x5,'c':'ed'},{'t':'奥菲斯在月光下把翅膀全展开了，墙上映了一片荧光。你觉得他是故意的。'},{'t':'奥菲斯用自己的荧光鳞粉编了个手环给你，戴上之后走哪都发光。你不确定这是礼物还是定位器。'}],'acheron':[{'t':'阿刻戎像一尊黑色的雕像般守在你身侧。但当你靠近时，你能清晰地听到他厚重的甲壳下，心脏正在以极不正常的频率疯狂跳动。','h':0xa,'c':'es'},{'t':'你好奇地触碰了一下阿刻戎身后的毒尾。毒尾猛地痉挛起来，一滴致命的透明毒液失控地滴落在地，瞬间腐蚀了地面。他脸色惨白地跪求惩罚。','h':-0xa,'c':'ed'},{'t':'阿刻戎为你呈上了一块稀有的能量结晶。全程他的目光都死死盯着地面，双手捧着结晶，因为极力克制着不去看你而青筋暴起。','h':0xf,'c':'es'},{'t':'阿刻戎在换防时，身体隐隐散发出即将蜕壳的腥气。蜕壳期的帝蝎极其暴躁且渴望交配，你不得不释放大量荷尔蒙强行压制他的本能。','h':-0x14,'c':'ed'},{'t':'阿刻戎在你门口站了十二个小时没动。你让他休息，他说这是他的\x22职责\x22。'},{'t':'你碰到了阿刻戎的毒尾。他比你还紧张，握着你的手指检查了三遍。'}],'ignis':[{'t':'伊格尼斯半夜溜进你的茧室，从背后紧紧抱住了你。他身上的温度高得像个火炉，几乎要将你的皮肤烫出红印。你吸收了他过于充沛的狂躁能量。','h':0xf,'c':'es'},{'t':'伊格尼斯咳出了一小口带着火星的血液。火蛾族的生命太短了，你耗费了一些母体精华为他修补快要燃尽的内脏。','h':-0x14,'c':'ed'},{'t':'“今天比昨天更漂亮了……”伊格尼斯趴在你的腿上，眼角的红色妖纹因为过度兴奋而发烫，留下一道灼热的吻痕。'},{'t':'伊格尼斯在走廊上无差别散发着挑衅的高温，试图逼退所有想靠近你的雄虫。整个母巢的温度都因此升高了。','h':0xa,'c':'es'},{'t':'伊格尼斯今天体温不正常。靠近他的时候你衣角卷起来了，他装作没注意。'},{'t':'伊格尼斯半夜对着月亮发呆。你问他干嘛，他说“算日子”。你没追问。'}],'moss':[{'t':'你醒来时，发现手腕上缠着一根极其坚韧、肉眼几乎看不见的蛛丝。摩斯就在不远处的阴影里，慢条斯理地收紧着丝线。','h':-0xa,'c':'ed'},{'t':'摩斯为你端来了一碗浓郁的汁液。喝下后你感到四肢有些无力，他顺势将你抱起，微凉的螯肢轻轻摩擦着你的后颈。'},{'t':'几只试图向你求偶的低阶飞蛾在摩斯的领地附近神秘失踪了。他今晚来见你时，身上带着一股极好闻的、被提纯过的源质香气。','h':0x14,'c':'es'},{'t':'他在为你编织新的丝衣时，指尖不经意间划过你的脊背，残留了一点极微量的麻痹毒素，让你忍不住在摩斯怀里颤抖了一下。','h':-0xf,'c':'ed'},{'t':'你房间今天多了一层丝帘。你不记得下过这个命令。'},{'t':'一只冒犯你的公虫第二天消失了。摩斯端来早餐，什么都没提。','h':0xa,'c':'es'}]};vmc_7d07c7['DE']=DE;globalThis['DE']=vmc_7d07c7['DE'];vmc_7d07c7['DE']=DE;globalThis['DE']=DE;delete vmc_7d07c7['_$I6Z2Aw']['DE'];const RE={'sirius':[{'ms':0x2,'t':'塞琉斯的触须死死缠着你的手腕，力道大得几乎留下红痕。他把你抵在柔软的肉壁上，急促的喘息喷洒在你的颈窝：“母神……求您，疼疼我……”伴随着哽咽，某种温热粘稠的液体蹭上了你的大腿。'},{'ms':0x2,'t':'你刚沐浴完，塞琉斯就跪着靠了过来。他不敢直接触碰你，只是用那双毛茸茸的触须贪婪地舔舐你发梢滴落的水珠，眼神里满是渴求。'},{'ms':0x2,'t':'半梦半醒间，你感觉有东西在轻舔你的脚踝。睁眼发现是塞琉斯，他立刻受惊般地缩了回去，但嘴角还挂着一丝可疑的透明银丝。'},{'ms':0x2,'t':'半夜塞琉斯靠太近了，触角不自觉缠上了你的手腕，呼吸又轻又烫。你本来可以抽开手的，但没有。'},{'ms':0x3,'t':'你醒来时，发现自己被塞琉斯吐出的柔韧丝线半包裹着。他正埋首在你的双腿间，贪婪地舔舐着什么。察觉到你醒了，他不仅没有退缩，反而发出一声甜腻的低泣，将脸埋得更深。'},{'ms':0x3,'t':'发情期的塞琉斯彻底失去了理智。他的薄翅将你死死裹住，形成一个密不透风的茧。在这个狭小幽闭的空间里，你只能被迫承受他连绵不绝的滚烫亲吻。'},{'ms':0x4,'t':'处于侍孕期的塞琉斯变得极度粘人。他整夜整夜地将耳朵贴在你的小腹上，一边痴迷地听着里面的动静，一边用带着倒刺的舌头一遍遍清理你身上属于他的气味标记。'}],'cassius':[{'ms':0x2,'t':'卡修将你完全禁锢在他巨大的身躯下，锋利的刀臂紧紧贴着你的腰侧，只要一动就会见血。他低下头，用带着倒刺的舌头狠狠刮擦你的锁骨，声音嘶哑得可怕：“真想现在就把您吃下去……从头到脚，一点不剩。”'},{'ms':0x2,'t':'你只是轻轻碰了一下他的前臂，卡修瞬间浑身僵直。他猛地咬住自己的手背，靠着血液的腥味和疼痛才勉强压下立刻将你按倒交尾的恐怖本能。'},{'ms':0x2,'t':'卡修检查房间的时候你站太近了。刀臂从你腰侧擦过去，他整个虫僵了三秒。\x22……下次离远点。\x22声音是哑的。'},{'ms':0x3,'t':'狂躁期的卡修强行闯入了茧室。他的复眼已经彻底变成了猩红色，一口咬在你的肩膀上。没有流血，但他注入了某种让肌肉酥软的腺液，你只能被迫承受他极具侵略性的粗暴索取。'},{'ms':0x3,'t':'“别看别人……看着我。”卡修的刀臂钳制着你的下巴，粗糙的甲壳摩擦着你娇嫩的皮肤。他在你身上留下了深浅不一的咬痕，像是在宣誓绝对的所有权。'},{'ms':0x4,'t':'完成播种后的卡修陷入了一种诡异的平静。他跪在你面前，主动折断了自己最引以为傲的一小截刀臂递到你嘴边，眼神狂热：“母神，吃掉它……为了我们的孩子，把我也吃掉吧。”'}],'orpheus':[{'ms':0x2,'t':'整个茧室弥漫着甜腻到令人发指的催情鳞粉。奥菲斯的翅膀将你完全包裹，你感觉全身绵软无力。他微凉的唇顺着你的下颌线一路向下，留下湿漉漉的痕迹：“好乖，别忍着，你只需要在我的毒液里享受极乐就够了。”'},{'ms':0x2,'t':'奥菲斯不知从哪弄来了高浓度的花蜜，含在嘴里强行渡给你。致幻的作用让你视线模糊，只感觉到一双双冰凉的手游走遍你的全身。'},{'ms':0x2,'t':'奥菲斯的荧光粉沾到你肩上，凑过来帮你拂的时候嘴唇从你锁骨上面掠过。\x22不小心的。\x22但他翅膀在抖。'},{'ms':0x3,'t':'他在你的后颈注入了微量的致幻毒素。你失去了视觉，只能在黑暗中感受他微凉的身体紧紧贴着你，听见他在你耳边一遍遍病态地低语：“你是我的……连你的梦里都只能有我。”'},{'ms':0x3,'t':'奥菲斯的鳞粉让你陷入了深度的发情热。你哭着求他给你解药，他却笑着将手指探入得更深，眼底满是得逞的疯狂：“解药就是我啊，母神大人。”'},{'ms':0x4,'t':'奥菲斯用高浓度的信息素彻底封死了你的茧室。任何试图靠近的公虫都会被直接毒晕。他躺在你身侧，指腹摩挲着你微微隆起的小腹，满眼都是扭曲的甜蜜：“谁也别想打扰我们……”'}],'acheron':[{'ms':0x2,'t':'阿刻戎一贯冷硬的面具彻底碎裂了。他单膝跪地，将你的脚踝拉向自己，深深埋下头去。那根致命的毒尾在你身侧疯狂地痉挛、滴下黏液，彰显着这具禁欲的躯体正在忍受怎样恐怖的发情期折磨。'},{'ms':0x2,'t':'你只是无意中解开了一颗纽扣，阿刻戎就猛地转过身去。但他粗重的喘息声在安静的走廊里无处遁形，空气中属于帝蝎的烈性信息素正在失控飙升。'},{'ms':0x2,'t':'你在梦里感觉有东西贴上了手背。醒来看到阿刻戎跪在床边，那只从不碰任何虫的手正贴着你的。他发现你醒了，手
